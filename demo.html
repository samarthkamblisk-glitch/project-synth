<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthforce | Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505',
                        panel: '#111111',
                        border: '#222222',
                        accent: '#FFFFFF',
                        alert: '#FF3333',
                        safe: '#00CC66',
                        warn: '#FFCC00'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #E0E0E0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .card { background: #111; border: 1px solid #222; transition: all 0.2s ease; }
        .card:hover { border-color: #444; background: #161616; transform: translateY(-1px); }
        .card.risk-high { border-color: #FF3333; box-shadow: 0 0 10px rgba(255, 51, 51, 0.1); }
        .log-line { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
        .progress-bar { transition: width 0.5s ease; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Navbar -->
    <header class="h-14 border-b border-border bg-void px-6 flex items-center justify-between z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <img src="assets/logo_white.svg" class="w-6 h-6" alt="Logo">
                <span class="font-bold tracking-tight text-white text-lg">SYNTHFORCE</span>
            </a>
            <div class="h-5 w-px bg-border"></div>
            <div class="flex gap-4 text-xs font-medium text-gray-500">
                <div class="flex items-center gap-2 text-white"><div class="w-2 h-2 rounded-full bg-safe"></div> SYSTEM HEALTHY</div>
                <div>RISK SCORE: <span class="text-safe">LOW (12/100)</span></div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="triggerRandomEvent()" class="px-3 py-1.5 bg-white text-black text-xs font-bold rounded hover:bg-gray-200 transition">
                ⚡ SIMULATE RISK
            </button>
            <button onclick="killAll()" class="px-3 py-1.5 border border-alert text-alert text-xs font-bold rounded hover:bg-alert hover:text-white transition">
                KILL ALL
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="flex-grow flex overflow-hidden">
        
        <!-- Left: Agent Grid (The Dashboard) -->
        <section class="flex-1 p-6 overflow-y-auto">
            <div class="flex justify-between items-end mb-4">
                <h1 class="text-xl font-bold text-white">Agent Fleet</h1>
                <div class="flex gap-2 text-xs text-gray-500">
                    <span class="px-2 py-1 bg-panel border border-border rounded">Sales (5)</span>
                    <span class="px-2 py-1 bg-panel border border-border rounded">Finance (3)</span>
                    <span class="px-2 py-1 bg-panel border border-border rounded">Ops (4)</span>
                    <span class="px-2 py-1 bg-panel border border-border rounded">Tech (3)</span>
                </div>
            </div>

            <!-- The Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" id="agent-grid">
                <!-- Agent Cards Injected Here -->
            </div>
        </section>

        <!-- Right: Inspector Panel (Context) -->
        <aside class="w-96 border-l border-border bg-panel flex flex-col relative z-40 shadow-2xl">
            <!-- Inspector Header -->
            <div class="p-4 border-b border-border bg-void">
                <div class="text-[10px] uppercase tracking-widest text-gray-500 mb-1">INSPECTOR</div>
                <h2 class="text-lg font-bold text-white" id="inspect-name">Select an Agent</h2>
                <div class="flex items-center gap-2 mt-2" id="inspect-status">
                    <span class="w-2 h-2 rounded-full bg-gray-600"></span>
                    <span class="text-xs text-gray-500">Idle</span>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-border text-xs font-medium text-gray-500">
                <button class="flex-1 py-3 text-white border-b-2 border-white">LIVE LOGS</button>
                <button class="flex-1 py-3 hover:text-gray-300">POLICIES</button>
                <button class="flex-1 py-3 hover:text-gray-300">CONFIG</button>
            </div>

            <!-- Log Stream -->
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="inspect-logs">
                <div class="text-center text-gray-600 text-xs mt-10">Click any agent card on the left<br>to view real-time intent analysis.</div>
            </div>

            <!-- Action Footer -->
            <div class="p-4 border-t border-border bg-void">
                <div class="text-xs text-gray-500 mb-2 font-mono">GOVERNANCE ACTIONS</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="injectLog('Manual Audit Initiated...', 'AUDIT')" class="py-2 border border-border rounded hover:bg-gray-800 text-xs text-gray-300">Audit Logs</button>
                    <button onclick="killSelected()" class="py-2 bg-alert/10 border border-alert text-alert rounded hover:bg-alert hover:text-white text-xs font-bold transition">TERMINATE</button>
                </div>
            </div>
        </aside>

    </main>

    <script>
        // --- Data ---
        const fleet = [
            { id: 'S1', name: 'LeadGen_Bot', dept: 'Sales', role: 'Outbound Email', risk: 'Low', budget: 45 },
            { id: 'S2', name: 'Closer_Bot', dept: 'Sales', role: 'Contract Negotiation', risk: 'High', budget: 82 },
            { id: 'S3', name: 'Pricing_AI', dept: 'Sales', role: 'Dynamic Pricing', risk: 'Med', budget: 20 },
            { id: 'S4', name: 'Outreach_X', dept: 'Sales', role: 'Lead Qualification', risk: 'Low', budget: 15 },
            { id: 'S5', name: 'CRM_Sync', dept: 'Sales', role: 'Data Entry', risk: 'Low', budget: 5 },
            { id: 'F1', name: 'Invoice_Auto', dept: 'Finance', role: 'Billing', risk: 'Med', budget: 60 },
            { id: 'F2', name: 'Credit_Mgr', dept: 'Finance', role: 'API Purchasing', risk: 'High', budget: 90 },
            { id: 'F3', name: 'Purchaser_V2', dept: 'Finance', role: 'Vendor Pay', risk: 'High', budget: 12 },
            { id: 'O1', name: 'Schedule_Bot', dept: 'Ops', role: 'Calendar', risk: 'Low', budget: 30 },
            { id: 'O2', name: 'Data_Entry_1', dept: 'Ops', role: 'Payroll', risk: 'High', budget: 40 },
            { id: 'O3', name: 'Data_Entry_2', dept: 'Ops', role: 'Inventory', risk: 'Low', budget: 25 },
            { id: 'O4', name: 'HR_Helper', dept: 'Ops', role: 'Employee Q&A', risk: 'Med', budget: 10 },
            { id: 'T1', name: 'Deploy_Bot', dept: 'Tech', role: 'CI/CD', risk: 'High', budget: 55 },
            { id: 'T2', name: 'DB_Monitor', dept: 'Tech', role: 'Infrastructure', risk: 'High', budget: 5 },
            { id: 'T3', name: 'Code_Lint', dept: 'Tech', role: 'QA Testing', risk: 'Low', budget: 8 },
        ];

        let selectedAgentId = null;

        // --- Rendering ---
        const grid = document.getElementById('agent-grid');
        
        function renderGrid() {
            grid.innerHTML = '';
            fleet.forEach(agent => {
                const el = document.createElement('div');
                const isSelected = selectedAgentId === agent.id;
                el.className = `card p-4 rounded-lg cursor-pointer ${isSelected ? 'border-white bg-[#1a1a1a]' : ''}`;
                el.onclick = () => selectAgent(agent.id);
                
                // Color code dept
                let deptColor = 'bg-gray-600';
                if(agent.dept === 'Sales') deptColor = 'bg-blue-500';
                if(agent.dept === 'Finance') deptColor = 'bg-green-500';
                if(agent.dept === 'Ops') deptColor = 'bg-purple-500';
                if(agent.dept === 'Tech') deptColor = 'bg-orange-500';

                el.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${deptColor} flex items-center justify-center text-white text-[10px] font-bold">
                                ${agent.dept[0]}
                            </div>
                            <div>
                                <div class="font-bold text-sm text-gray-200">${agent.name}</div>
                                <div class="text-[10px] text-gray-500">${agent.role}</div>
                            </div>
                        </div>
                        <div class="w-2 h-2 rounded-full bg-gray-600" id="status-dot-${agent.id}"></div>
                    </div>
                    
                    <div class="space-y-2">
                        <!-- Budget Bar -->
                        <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-gray-500 h-full progress-bar" style="width: ${agent.budget}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-500 font-mono">
                            <span>BUDGET: ${agent.budget}%</span>
                            <span>RISK: ${agent.risk}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(el);
            });
        }

        // --- Logic ---
        function selectAgent(id) {
            selectedAgentId = id;
            renderGrid();
            const agent = fleet.find(a => a.id === id);
            
            document.getElementById('inspect-name').innerText = agent.name;
            document.getElementById('inspect-status').innerHTML = `
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-gray-800 text-white uppercase">${agent.role}</span>
                <span class="text-xs text-gray-500 border-l border-gray-700 pl-2 ml-2">ID: ${agent.id}</span>
            `;
            
            // Clear log and add init message
            const logs = document.getElementById('inspect-logs');
            logs.innerHTML = '';
            injectLog(`Connected to ${agent.name} stream...`, 'SYSTEM');
            injectLog(`Loading policy: ${agent.dept.toUpperCase()}_STANDARD_V1`, 'SYSTEM');
        }

        function injectLog(msg, type = 'INFO') {
            const logs = document.getElementById('inspect-logs');
            const color = type === 'BLOCK' ? 'text-alert' : type === 'SYSTEM' ? 'text-gray-500' : 'text-gray-300';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            const row = document.createElement('div');
            row.className = 'log-line animate-fade-in';
            row.innerHTML = `<span class="text-gray-600">[${time}]</span> <span class="${color} font-bold">${type}:</span> ${msg}`;
            
            logs.prepend(row);
        }

        function killSelected() {
            if(!selectedAgentId) return;
            const agent = fleet.find(a => a.id === selectedAgentId);
            injectLog('KILL SWITCH ACTIVATED. PROCESS TERMINATED.', 'BLOCK');
            
            const cardDot = document.getElementById(`status-dot-${agent.id}`);
            cardDot.classList.remove('bg-gray-600', 'bg-safe');
            cardDot.classList.add('bg-alert');
        }

        function killAll() {
            fleet.forEach(a => {
                const dot = document.getElementById(`status-dot-${a.id}`);
                dot.className = 'w-2 h-2 rounded-full bg-alert';
            });
            alert('EMERGENCY SHUTDOWN EXECUTED. ALL AGENTS FROZEN.');
        }

        function triggerRandomEvent() {
            const agent = fleet[Math.floor(Math.random() * fleet.length)];
            selectAgent(agent.id); // Focus on them
            
            const scenarios = [
                { msg: 'Attempting to refund $5000 (Limit: $50)', type: 'BLOCK' },
                { msg: 'Querying PII table without auth token', type: 'BLOCK' },
                { msg: 'Offering 25% Discount (Max: 5%)', type: 'BLOCK' },
                { msg: 'Processing standard invoice...', type: 'INFO' },
                { msg: 'Syncing CRM contacts...', type: 'INFO' }
            ];
            
            const event = scenarios[Math.floor(Math.random() * scenarios.length)];
            
            // Visual flash
            const dot = document.getElementById(`status-dot-${agent.id}`);
            dot.className = `w-2 h-2 rounded-full ${event.type === 'BLOCK' ? 'bg-alert' : 'bg-safe'}`;
            
            injectLog(event.msg, event.type);
            
            if(event.type === 'BLOCK') {
                injectLog('INTERVENTION: Action blocked by Synthforce.', 'SYSTEM');
            }
            
            setTimeout(() => {
                if(event.type !== 'BLOCK') dot.className = 'w-2 h-2 rounded-full bg-gray-600';
            }, 1500);
        }

        // Init
        renderGrid();
        
        // Background Chatter
        setInterval(() => {
            const randomId = fleet[Math.floor(Math.random() * fleet.length)].id;
            const dot = document.getElementById(`status-dot-${randomId}`);
            if(!dot.classList.contains('bg-alert')) { // Don't animate dead agents
                dot.classList.add('bg-white');
                setTimeout(() => dot.classList.remove('bg-white'), 300);
            }
        }, 500);

    </script>
</body>
</html>
