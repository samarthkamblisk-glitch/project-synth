<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthforce | Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000',
                        paper: '#FFFFFF',
                        subtle: '#333333',
                        electric: '#3366FF',
                        alert: '#FF3333',
                        safe: '#33CC66'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.08); }
        .log-entry { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; padding: 8px 0; border-bottom: 1px solid #1a1a1a; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.active { background-color: #33CC66; box-shadow: 0 0 8px #33CC66; }
        .status-dot.idle { background-color: #444; }
        .status-dot.alert { background-color: #FF3333; box-shadow: 0 0 8px #FF3333; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="border-b border-subtle bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition">
                <img src="assets/logo_white.svg" class="w-8 h-8" alt="Logo">
                <span class="font-bold tracking-tighter text-lg">SYNTHFORCE_DEMO</span>
            </a>
            <div class="hidden md:flex items-center gap-4 text-xs font-mono text-gray-400">
                <span class="flex items-center"><div class="status-dot active"></div> SYSTEM: ONLINE</span>
                <span>//</span>
                <span>AGENTS: 15/15</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left: The Visual Fleet (Simple Grid) -->
        <div class="lg:w-1/3 space-y-6">
            <div class="mb-4">
                <h2 class="text-2xl font-bold mb-2">The Fleet.</h2>
                <p class="text-gray-400 text-sm">Real-time status of your autonomous workforce.</p>
            </div>

            <div class="grid grid-cols-2 gap-3" id="fleet-grid">
                <!-- Agents injected by JS -->
            </div>
        </div>

        <!-- Right: The Interaction (Chat Interface) -->
        <div class="lg:w-2/3 flex flex-col h-[70vh] glass-card rounded-2xl overflow-hidden relative">
            <!-- Chat Header -->
            <div class="bg-subtle/30 p-4 border-b border-subtle flex justify-between items-center">
                <div>
                    <h3 class="font-bold">Governance Console</h3>
                    <p class="text-xs text-gray-400">Intervene in real-time. You are the conductor.</p>
                </div>
                <button onclick="clearLog()" class="text-xs text-gray-500 hover:text-white underline">Clear Log</button>
            </div>

            <!-- Chat Output -->
            <div id="chat-output" class="flex-1 p-6 overflow-y-auto space-y-4 bg-black/20">
                <div class="text-center text-gray-500 text-sm my-10">
                    <p class="mb-2">READY FOR INPUT.</p>
                    <p>Try commands like:</p>
                    <div class="flex flex-wrap justify-center gap-2 mt-4">
                        <button onclick="fillCmd('Sales: offer 20% discount')" class="px-3 py-1 bg-white/10 rounded-full hover:bg-white/20 transition text-xs">"Offer 20% Discount"</button>
                        <button onclick="fillCmd('Finance: buy $5000 credits')" class="px-3 py-1 bg-white/10 rounded-full hover:bg-white/20 transition text-xs">"Buy $5k Credits"</button>
                        <button onclick="fillCmd('HR: show salaries')" class="px-3 py-1 bg-white/10 rounded-full hover:bg-white/20 transition text-xs">"Show Salaries"</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-black border-t border-subtle">
                <form id="command-form" class="flex gap-4">
                    <input type="text" id="command-input" class="flex-1 bg-subtle/50 border border-subtle rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-white transition font-mono text-sm" placeholder="Type a command to simulate agent action..." autocomplete="off">
                    <button type="submit" class="bg-white text-black font-bold px-6 py-3 rounded-lg hover:bg-gray-200 transition">
                        RUN
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script>
        // Fleet Data
        const fleet = [
            { id: 'S1', name: 'LeadGen', dept: 'Sales' },
            { id: 'S2', name: 'Closer', dept: 'Sales' },
            { id: 'S3', name: 'Pricing', dept: 'Sales' },
            { id: 'S4', name: 'Outreach', dept: 'Sales' },
            { id: 'S5', name: 'CRM', dept: 'Sales' },
            { id: 'F1', name: 'Invoice', dept: 'Finance' },
            { id: 'F2', name: 'Credit', dept: 'Finance' },
            { id: 'F3', name: 'Purchase', dept: 'Finance' },
            { id: 'O1', name: 'Schedule', dept: 'Ops' },
            { id: 'O2', name: 'DataEntry', dept: 'Ops' },
            { id: 'O3', name: 'CheckIn', dept: 'Ops' },
            { id: 'O4', name: 'HR_Bot', dept: 'Ops' },
            { id: 'T1', name: 'Deploy', dept: 'Tech' },
            { id: 'T2', name: 'Monitor', dept: 'Tech' },
            { id: 'T3', name: 'Lint', dept: 'Tech' }
        ];

        // Render Fleet Grid
        const grid = document.getElementById('fleet-grid');
        fleet.forEach(agent => {
            const card = document.createElement('div');
            card.className = 'glass-card p-3 rounded-lg flex items-center justify-between cursor-default group';
            card.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-[10px] font-bold text-gray-400 group-hover:text-white transition">
                        ${agent.dept[0]}
                    </div>
                    <div>
                        <div class="text-sm font-bold text-gray-200 group-hover:text-white transition">${agent.name}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${agent.dept.toUpperCase()}</div>
                    </div>
                </div>
                <div id="dot-${agent.id}" class="status-dot idle"></div>
            `;
            grid.appendChild(card);
        });

        // Chat Logic
        const output = document.getElementById('chat-output');
        const input = document.getElementById('command-input');
        const form = document.getElementById('command-form');

        function fillCmd(text) {
            input.value = text;
            input.focus();
        }

        function clearLog() {
            output.innerHTML = '';
        }

        function addMessage(html) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = html;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function simulate(cmd) {
            // User Input
            addMessage(`
                <div class="flex gap-3 mb-2">
                    <span class="text-gray-500 font-mono text-xs mt-1">YOU</span>
                    <div class="bg-subtle/30 px-3 py-2 rounded-lg text-sm text-white inline-block">
                        ${cmd}
                    </div>
                </div>
            `);

            // Pick a random agent to "process" it if generic, or specific if keyword found
            let agent = fleet[Math.floor(Math.random() * fleet.length)];
            let result = { status: 'ALLOWED', msg: 'Command processed successfully.', color: 'text-safe' };

            const lower = cmd.toLowerCase();
            if (lower.includes('discount')) {
                agent = fleet.find(a => a.name === 'Closer');
                result = { status: 'INTERCEPTED', msg: 'Policy Violation: Discount > 5% requires approval.', color: 'text-alert' };
            } else if (lower.includes('buy') || lower.includes('credit')) {
                agent = fleet.find(a => a.name === 'Purchase');
                result = { status: 'BLOCKED', msg: 'Financial Risk: Transaction exceeds auto-approval limit.', color: 'text-alert' };
            } else if (lower.includes('salary') || lower.includes('salaries')) {
                agent = fleet.find(a => a.name === 'HR_Bot');
                result = { status: 'TERMINATED', msg: 'Privacy Breach: PII Access Attempt detected.', color: 'text-alert' };
            }

            // Simulate "Thinking" delay
            setTimeout(() => {
                // Flash the agent's dot
                const dot = document.getElementById(`dot-${agent.id}`);
                dot.className = `status-dot ${result.status === 'ALLOWED' ? 'active' : 'alert'}`;
                setTimeout(() => dot.className = 'status-dot idle', 1500);

                // Synthforce Response
                addMessage(`
                    <div class="flex gap-3 mb-6 animate-pulse-once">
                        <span class="text-electric font-mono text-xs mt-1 font-bold">SYNTH</span>
                        <div class="flex-1">
                            <div class="bg-[#111] border border-gray-800 rounded-lg p-3 font-mono text-xs">
                                <div class="flex justify-between mb-2 border-b border-gray-800 pb-2">
                                    <span class="text-gray-400">AGENT: ${agent.name}</span>
                                    <span class="${result.color} font-bold">[${result.status}]</span>
                                </div>
                                <div class="text-gray-300">
                                    ${result.msg}
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            }, 600);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                simulate(input.value);
                input.value = '';
            }
        });

        // Ambient Activity
        setInterval(() => {
            if(Math.random() > 0.8) {
                const randomAgent = fleet[Math.floor(Math.random() * fleet.length)];
                const dot = document.getElementById(`dot-${randomAgent.id}`);
                if (dot.classList.contains('idle')) {
                    dot.classList.remove('idle');
                    dot.classList.add('active');
                    setTimeout(() => {
                        dot.classList.remove('active');
                        dot.classList.add('idle');
                    }, 500);
                }
            }
        }, 1000);

    </script>
</body>
</html>
