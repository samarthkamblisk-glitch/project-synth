<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Circle Container -->
    <circle cx="50" cy="50" r="45" stroke="white" stroke-width="4" fill="black"/>
    
    <!-- Stylized 'S' Logic -->
    <!-- Top Curve -->
    <path d="M70 35 C 70 20, 30 20, 30 35 L 50 55" stroke="white" stroke-width="5" stroke-linecap="square" fill="none"/>
    <!-- Bottom Curve -->
    <path d="M30 65 C 30 80, 70 80, 70 65 L 50 45" stroke="white" stroke-width="5" stroke-linecap="square" fill="none"/>
    
    <!-- Vertical Intersects (Abstracted from image concept) -->
    <line x1="40" y1="35" x2="40" y2="45" stroke="white" stroke-width="4"/>
    <line x1="60" y1="55" x2="60" y2="65" stroke="white" stroke-width="4"/>
</svg>
